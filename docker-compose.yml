services:
  db:
    image: postgres:16-alpine
    container_name: playup_db
    environment:
      POSTGRES_USER: playup
      POSTGRES_PASSWORD: playup
      POSTGRES_DB: playup_dev
    ports:
      # 5433 снаружи, чтобы не конфликтовать с локальным Postgres на 5432
      - "5433:5432"
    volumes:
      - playup_pgdata:/var/lib/postgresql/data

volumes:
  playup_pgdata:
